<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Color Hide And Seek</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101419;
      --panel: rgba(18, 24, 31, 0.86);
      --panel-border: rgba(255, 255, 255, 0.14);
      --text: #f3f7fb;
      --muted: #a8b5c2;
      --accent: #35c48f;
      --accent-strong: #25a877;
      --danger: #ff5c6c;
      --warning: #ffcc4d;
      --field: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      display: block;
    }

    button,
    input {
      font: inherit;
    }

    button {
      min-height: 40px;
      border: 0;
      border-radius: 8px;
      padding: 0 14px;
      background: var(--accent);
      color: #06130f;
      font-weight: 800;
      cursor: pointer;
      transition: background 140ms ease, opacity 140ms ease, transform 140ms ease;
    }

    button:hover {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
      transform: none;
    }

    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 0 14px;
      background: var(--field);
      color: var(--text);
      outline: none;
    }

    input:focus {
      border-color: rgba(53, 196, 143, 0.9);
      box-shadow: 0 0 0 3px rgba(53, 196, 143, 0.16);
    }

    .lobby {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(135deg, rgba(16, 20, 25, 0.94), rgba(16, 20, 25, 0.7)),
        radial-gradient(circle at center, rgba(53, 196, 143, 0.18), transparent 45%);
    }

    .is-hidden {
      display: none !important;
    }

    .panel {
      width: min(460px, 100%);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 24px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(16px);
    }

    .title {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.5;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .join-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    .status {
      min-height: 22px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .status.is-error {
      color: var(--danger);
    }

    .hud {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 10;
      display: none;
      gap: 10px;
      align-items: center;
      max-width: calc(100% - 28px);
      padding: 10px 12px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: rgba(18, 24, 31, 0.74);
      backdrop-filter: blur(12px);
      font-size: 14px;
    }

    .hud.is-visible {
      display: flex;
    }

    .hud-actions {
      display: flex;
      gap: 8px;
      margin-left: 6px;
    }

    .hud-actions button {
      min-height: 34px;
      padding: 0 10px;
      font-size: 13px;
    }

    .dot {
      width: 10px;
      height: 10px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--danger);
    }

    .dot.is-online {
      background: var(--accent);
    }

    .room-code,
    .role {
      font-weight: 800;
      letter-spacing: 0.06em;
    }

    .crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      z-index: 8;
      width: 18px;
      height: 18px;
      display: none;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .crosshair::before,
    .crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.8);
    }

    .crosshair::before {
      top: 8px;
      left: 0;
      width: 18px;
      height: 2px;
    }

    .crosshair::after {
      top: 0;
      left: 8px;
      width: 2px;
      height: 18px;
    }

    .crosshair.is-visible {
      display: block;
    }

    .center-overlay {
      position: fixed;
      inset: 0;
      z-index: 24;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.62);
      text-align: center;
      pointer-events: none;
    }

    .center-overlay.is-visible {
      display: grid;
    }

    .role-card {
      width: min(520px, 100%);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 26px;
      background: rgba(18, 24, 31, 0.9);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(16px);
    }

    .role-card h2 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1;
      letter-spacing: 0;
    }

    .role-card p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }

    .blind {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      place-items: center;
      background: #000000;
      color: var(--text);
      text-align: center;
      pointer-events: none;
      font-size: 24px;
      font-weight: 800;
    }

    .blind.is-visible {
      display: grid;
    }

    .blind strong {
      display: block;
      margin-top: 12px;
      color: var(--warning);
      font-size: 56px;
      line-height: 1;
    }

    .paint-tools {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 14;
      display: none;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: rgba(18, 24, 31, 0.82);
      backdrop-filter: blur(12px);
    }

    .paint-tools.is-visible {
      display: flex;
    }

    .paint-tools input {
      width: 48px;
      min-height: 36px;
      padding: 2px;
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 9;
      width: min(720px, calc(100% - 28px));
      transform: translateX(-50%);
      padding: 10px 12px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: rgba(18, 24, 31, 0.72);
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      backdrop-filter: blur(12px);
      pointer-events: none;
    }

    @media (max-width: 680px) {
      .panel {
        padding: 18px;
      }

      .join-row {
        grid-template-columns: 1fr;
      }

      .hud {
        align-items: flex-start;
        flex-direction: column;
      }

      .hud-actions {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <div id="lobby" class="lobby">
    <section class="panel" aria-label="Lobby">
      <h1 class="title">Color Hide And Seek</h1>
      <p class="subtitle">Create a room, wait for friends, then start the hunt.</p>

      <div class="stack">
        <button id="createRoomButton" type="button">Create Room</button>

        <div class="join-row">
          <input id="roomCodeInput" type="text" inputmode="numeric" maxlength="4" placeholder="Room code" aria-label="Room code">
          <button id="joinRoomButton" type="button">Join Room</button>
        </div>
      </div>

      <div id="statusText" class="status">Connecting...</div>
    </section>
  </div>

  <div id="hud" class="hud">
    <span id="connectionDot" class="dot" aria-hidden="true"></span>
    <span>Room <span id="roomCodeLabel" class="room-code">----</span></span>
    <span>Role <span id="roleLabel" class="role">LOBBY</span></span>
    <span id="blindLabel"></span>
    <div class="hud-actions">
      <button id="startGameButton" class="is-hidden" type="button">Start Game</button>
    </div>
  </div>

  <div id="crosshair" class="crosshair"></div>
  <div id="blindOverlay" class="blind">
    <div>Seeker blind time<strong><span id="blindTimeLabel">30</span>s</strong></div>
  </div>

  <div id="roleOverlay" class="center-overlay">
    <div class="role-card">
      <h2 id="roleRevealTitle">You are...</h2>
      <p id="roleRevealText">Get ready.</p>
    </div>
  </div>

  <div id="paintTools" class="paint-tools">
    <input id="paintColorInput" type="color" value="#35c48f" aria-label="Paint color">
    <button id="clearPaintButton" type="button">Clear</button>
  </div>

  <div id="hint" class="hint">Click to lock camera. WASD moves, Space jumps, E paints directly on yourself, Seeker clicks Hiders to tag.</div>
  <canvas id="paintCanvas" width="512" height="512" class="is-hidden"></canvas>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    const socket = io("https://colorhideandseek.onrender.com");

    const lobby = document.getElementById("lobby");
    const hud = document.getElementById("hud");
    const statusText = document.getElementById("statusText");
    const connectionDot = document.getElementById("connectionDot");
    const roomCodeLabel = document.getElementById("roomCodeLabel");
    const roleLabel = document.getElementById("roleLabel");
    const blindLabel = document.getElementById("blindLabel");
    const createRoomButton = document.getElementById("createRoomButton");
    const joinRoomButton = document.getElementById("joinRoomButton");
    const roomCodeInput = document.getElementById("roomCodeInput");
    const startGameButton = document.getElementById("startGameButton");
    const blindOverlay = document.getElementById("blindOverlay");
    const blindTimeLabel = document.getElementById("blindTimeLabel");
    const roleOverlay = document.getElementById("roleOverlay");
    const roleRevealTitle = document.getElementById("roleRevealTitle");
    const roleRevealText = document.getElementById("roleRevealText");
    const paintTools = document.getElementById("paintTools");
    const paintColorInput = document.getElementById("paintColorInput");
    const clearPaintButton = document.getElementById("clearPaintButton");
    const paintCanvas = document.getElementById("paintCanvas");
    const hint = document.getElementById("hint");
    const crosshair = document.getElementById("crosshair");

    const keyboardState = new Map();
    const remotePlayers = new Map();
    const colliders = [];
    const raycaster = new THREE.Raycaster();
    const paintContext = paintCanvas.getContext("2d", { willReadFrequently: false });
    const textureLoader = new THREE.TextureLoader();

    const localState = {
      roomCode: null,
      playerId: null,
      hostId: null,
      roomStatus: "lobby",
      role: "lobby",
      scale: 1,
      isBlind: false,
      isCaught: false,
      canMove: true,
      blindRemainingMs: 0,
      revealRemainingMs: 0,
      sendIntervalMs: 75,
      lastMoveSentAt: 0,
      paintMode: false,
      isPainting: false,
      isCameraOrbitingPaint: false,
      baseColor: "#35c48f",
      paintDataUrl: null,
      lastSentPaintDataUrl: null,
      localPaintDirty: false,
      hasServerSpawn: false,
      lastPaintSentAt: 0,
      velocityY: 0,
      grounded: true,
      yaw: 0,
      pitch: 0.38,
      pointerLocked: false
    };

    let scene;
    let camera;
    let renderer;
    let localPlayer;
    let localPaintTexture;
    let animationStarted = false;
    let previousFrameAt = performance.now();

    function setStatus(message, isError = false) {
      statusText.textContent = message;
      statusText.classList.toggle("is-error", isError);
    }

    function setBusy(isBusy) {
      createRoomButton.disabled = isBusy;
      joinRoomButton.disabled = isBusy;
      roomCodeInput.disabled = isBusy;
    }

    function emitWithAck(eventName, payload = {}) {
      return new Promise((resolve, reject) => {
        socket.timeout(6000).emit(eventName, payload, (error, response) => {
          if (error) {
            reject(new Error("Server response timed out."));
            return;
          }

          resolve(response);
        });
      });
    }

    function normalizePlayerId(player) {
      return player?.playerId || player?.id;
    }

    function startGameClient(response) {
      localState.roomCode = response.roomCode;
      localState.playerId = response.playerId || socket.id;

      lobby.classList.add("is-hidden");
      hud.classList.add("is-visible");
      roomCodeLabel.textContent = localState.roomCode;

      initScene();
      applyRoomState(response.room);
      startAnimationLoop();
    }

    function initScene() {
      if (scene) {
        return;
      }

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0xdbe8f2);

      camera = new THREE.PerspectiveCamera(68, window.innerWidth / window.innerHeight, 0.1, 1000);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      const ambientLight = new THREE.HemisphereLight(0xffffff, 0xa7b6c2, 2.25);
      scene.add(ambientLight);

      const sunLight = new THREE.DirectionalLight(0xffffff, 2.85);
      sunLight.position.set(8, 13, 6);
      sunLight.castShadow = true;
      sunLight.shadow.mapSize.set(1024, 1024);
      scene.add(sunLight);

      buildHouseMap();
      setupPaintCanvas("#35c48f");

      localPlayer = createPlayerMesh("#35c48f", true);
      localPlayer.position.set(0, 1, 14);
      scene.add(localPlayer);
      updateCamera(1);

      window.addEventListener("resize", resizeRenderer);
      window.addEventListener("keydown", handleKeyDown);
      window.addEventListener("keyup", handleKeyUp);
      window.addEventListener("blur", () => keyboardState.clear());
      document.addEventListener("pointerlockchange", handlePointerLockChange);
      document.addEventListener("mousemove", handleMouseMove);
      renderer.domElement.addEventListener("click", handleCanvasClick);
      renderer.domElement.addEventListener("pointerdown", handlePointerDown);
      renderer.domElement.addEventListener("pointermove", handlePointerMove);
      renderer.domElement.addEventListener("pointerup", handlePointerUp);
      renderer.domElement.addEventListener("pointercancel", handlePointerUp);
      renderer.domElement.addEventListener("contextmenu", (event) => event.preventDefault());
    }

    function buildHouseMap() {
      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(46, 36),
        new THREE.MeshStandardMaterial({ color: 0x6f8278, roughness: 0.82 })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.receiveShadow = true;
      scene.add(floor);

      const wallMaterial = new THREE.MeshStandardMaterial({ color: 0xe2dcc9, roughness: 0.78 });
      const wood = new THREE.MeshStandardMaterial({ color: 0x9a6a42, roughness: 0.72 });
      const darkWood = new THREE.MeshStandardMaterial({ color: 0x6e5139, roughness: 0.76 });
      const fabric = new THREE.MeshStandardMaterial({ color: 0x9a586b, roughness: 0.84 });
      const blue = new THREE.MeshStandardMaterial({ color: 0x5f93ae, roughness: 0.7 });
      const white = new THREE.MeshStandardMaterial({ color: 0xe0e3d8, roughness: 0.68 });
      const metal = new THREE.MeshStandardMaterial({ color: 0xa6b0b6, roughness: 0.54, metalness: 0.12 });

      addStaticBox("back-wall", [0, 2, -18], [46, 4, 0.55], wallMaterial);
      addStaticBox("front-wall-left", [-14, 2, 18], [18, 4, 0.55], wallMaterial);
      addStaticBox("front-wall-right", [14, 2, 18], [18, 4, 0.55], wallMaterial);
      addStaticBox("left-wall", [-23, 2, 0], [0.55, 4, 36], wallMaterial);
      addStaticBox("right-wall", [23, 2, 0], [0.55, 4, 36], wallMaterial);
      addStaticBox("bedroom-wall-a", [-5, 2, -12], [0.5, 4, 12], wallMaterial);
      addStaticBox("bedroom-wall-b", [-5, 2, 3], [0.5, 4, 7], wallMaterial);
      addStaticBox("kitchen-half-wall", [10, 1.25, 2], [13, 2.5, 0.5], wallMaterial);
      addStaticBox("closet-wall", [12, 2, -11], [0.5, 4, 8], wallMaterial);

      addBed(-15, -12, wood, fabric);
      addWardrobe(-20, -5, darkWood);
      addWardrobe(-9, -16, darkWood);
      addDrawer(-18, 2, wood);
      addTable(-13, 5, wood);
      addChair(-15, 5, blue);
      addChair(-11, 5, blue);

      addKitchen(0, -2, wood, white, metal);
      addStaticBox("fridge", [19.5, 1.75, -1], [1.8, 3.5, 1.6], metal);
      addStaticBox("oven", [17, 0.8, -1], [1.8, 1.6, 1.4], metal);

      addStaticBox("sofa", [15, 0.55, 11], [6.2, 1.1, 2], fabric);
      addStaticBox("sofa-back", [15, 1.25, 11.8], [6.2, 1.5, 0.45], fabric);
      addStaticBox("coffee-table", [15, 0.42, 7.2], [3.6, 0.45, 1.5], wood);
      addStaticBox("tv-stand", [20, 0.7, 3], [1.3, 1.4, 5], darkWood);
      addStaticBox("bookshelf", [20.1, 1.7, -8], [1.4, 3.4, 5], darkWood);
      addStaticBox("plant-pot", [19, 0.45, -15], [1, 0.9, 1], new THREE.MeshStandardMaterial({ color: 0x8a5640, roughness: 0.8 }));
      addStaticBox("plant-top", [19, 1.55, -15], [1.6, 1.6, 1.6], new THREE.MeshStandardMaterial({ color: 0x2f8f5b, roughness: 0.9 }), false);
      addRug(14, 7.4, 7.5, 4.8, 0x456f7f);
      addRug(-14, -9.5, 6.2, 4.4, 0x8b6f4e);
      addLamp(10, 12.8);
      addLamp(-6, 13.4);
      addWindow(-22.72, -11, Math.PI / 2);
      addWindow(22.72, 9, -Math.PI / 2);
      addWallPicture(-14, -17.72);
      addWallPicture(5, -17.72);
    }

    function addStaticBox(name, position, scale, material, collides = true) {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(scale[0], scale[1], scale[2]), material);
      mesh.name = name;
      mesh.position.set(position[0], position[1], position[2]);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);

      if (collides) {
        colliders.push({
          minX: position[0] - scale[0] / 2,
          maxX: position[0] + scale[0] / 2,
          minZ: position[2] - scale[2] / 2,
          maxZ: position[2] + scale[2] / 2
        });
      }

      return mesh;
    }

    function addBed(x, z, wood, fabric) {
      addStaticBox("bed-frame", [x, 0.45, z], [5.2, 0.9, 3.2], wood);
      addStaticBox("bed-mattress", [x, 1.05, z], [4.8, 0.45, 2.8], fabric, false);
      addStaticBox("bed-pillow", [x - 1.5, 1.35, z - 0.85], [1.4, 0.35, 0.8], new THREE.MeshStandardMaterial({ color: 0xd6d2c6, roughness: 0.9 }), false);
    }

    function addWardrobe(x, z, material) {
      addStaticBox("wardrobe", [x, 1.65, z], [2.2, 3.3, 3], material);
      addStaticBox("wardrobe-door-a", [x - 0.58, 1.65, z + 1.53], [0.08, 2.8, 1.25], material, false);
      addStaticBox("wardrobe-door-b", [x + 0.58, 1.65, z + 1.53], [0.08, 2.8, 1.25], material, false);
    }

    function addDrawer(x, z, material) {
      addStaticBox("drawer-body", [x, 0.95, z], [3, 1.9, 1.4], material);
      addStaticBox("drawer-front-a", [x, 1.3, z + 0.73], [2.6, 0.45, 0.08], material, false);
      addStaticBox("drawer-front-b", [x, 0.75, z + 0.73], [2.6, 0.45, 0.08], material, false);
    }

    function addTable(x, z, material) {
      addStaticBox("table-top", [x, 1.05, z], [4, 0.3, 2.2], material);
      addStaticBox("table-leg", [x - 1.65, 0.5, z - 0.8], [0.25, 1, 0.25], material);
      addStaticBox("table-leg", [x + 1.65, 0.5, z - 0.8], [0.25, 1, 0.25], material);
      addStaticBox("table-leg", [x - 1.65, 0.5, z + 0.8], [0.25, 1, 0.25], material);
      addStaticBox("table-leg", [x + 1.65, 0.5, z + 0.8], [0.25, 1, 0.25], material);
    }

    function addChair(x, z, material) {
      addStaticBox("chair-seat", [x, 0.55, z], [1, 0.3, 1], material);
      addStaticBox("chair-back", [x, 1.2, z + 0.45], [1, 1.2, 0.25], material);
    }

    function addKitchen(x, z, wood, white, metal) {
      addStaticBox("kitchen-counter-a", [x, 0.75, z], [7, 1.5, 1.5], white);
      addStaticBox("kitchen-counter-b", [x - 3.4, 0.75, z - 2.5], [1.5, 1.5, 5], white);
      addStaticBox("kitchen-island", [x + 6, 0.8, z - 2.2], [4.8, 1.6, 2], wood);
      addStaticBox("sink", [x - 1.5, 1.62, z], [1.5, 0.18, 1], metal, false);
      addStaticBox("upper-cabinet-a", [x - 1.6, 2.75, z - 0.65], [3, 1, 0.5], wood, false);
      addStaticBox("upper-cabinet-b", [x + 2.2, 2.75, z - 0.65], [3, 1, 0.5], wood, false);
      addStaticBox("counter-handle-a", [x - 1.6, 1.22, z + 0.78], [2.3, 0.08, 0.08], metal, false);
      addStaticBox("counter-handle-b", [x + 2.2, 1.22, z + 0.78], [2.3, 0.08, 0.08], metal, false);
    }

    function addRug(x, z, width, depth, color) {
      const rug = new THREE.Mesh(
        new THREE.BoxGeometry(width, 0.04, depth),
        new THREE.MeshStandardMaterial({ color, roughness: 0.95 })
      );
      rug.position.set(x, 0.035, z);
      rug.receiveShadow = true;
      scene.add(rug);
    }

    function addLamp(x, z) {
      const poleMaterial = new THREE.MeshStandardMaterial({ color: 0x303842, roughness: 0.5, metalness: 0.25 });
      const shadeMaterial = new THREE.MeshStandardMaterial({ color: 0xffe2a7, roughness: 0.7, emissive: 0x5a3d15, emissiveIntensity: 0.25 });
      const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 2.1, 14), poleMaterial);
      pole.position.set(x, 1.05, z);
      pole.castShadow = true;
      scene.add(pole);

      const shade = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.75, 0.65, 18), shadeMaterial);
      shade.position.set(x, 2.35, z);
      shade.castShadow = true;
      scene.add(shade);

      const light = new THREE.PointLight(0xffd79a, 1.2, 9);
      light.position.set(x, 2.15, z);
      scene.add(light);
    }

    function addWindow(x, z, rotationY) {
      const frame = new THREE.Group();
      const glassMaterial = new THREE.MeshStandardMaterial({ color: 0x9dd5ff, roughness: 0.28, metalness: 0.05 });
      const trimMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.6 });
      const glass = new THREE.Mesh(new THREE.BoxGeometry(0.08, 1.6, 2.6), glassMaterial);
      const trimTop = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 2.9), trimMaterial);
      const trimBottom = trimTop.clone();
      trimTop.position.y = 0.86;
      trimBottom.position.y = -0.86;
      frame.add(glass, trimTop, trimBottom);
      frame.position.set(x, 2.2, z);
      frame.rotation.y = rotationY;
      scene.add(frame);
    }

    function addWallPicture(x, z) {
      const picture = new THREE.Mesh(
        new THREE.BoxGeometry(3.2, 1.7, 0.08),
        new THREE.MeshStandardMaterial({ color: 0x4f8cff, roughness: 0.66 })
      );
      picture.position.set(x, 2.35, z);
      scene.add(picture);
    }

    function createPlayerMesh(color, usePaintTexture = false) {
      const geometry = new THREE.CapsuleGeometry(0.45, 1.1, 8, 18);
      const material = new THREE.MeshStandardMaterial({
        color: usePaintTexture ? 0xffffff : color,
        roughness: 0.56,
        metalness: 0.02,
        transparent: true
      });

      if (usePaintTexture) {
        localPaintTexture = new THREE.CanvasTexture(paintCanvas);
        localPaintTexture.colorSpace = THREE.SRGBColorSpace;
        material.map = localPaintTexture;
      }

      const mesh = new THREE.Mesh(geometry, material);
      mesh.castShadow = true;
      mesh.userData.playerId = null;
      return mesh;
    }

    function setupPaintCanvas(baseColor) {
      paintContext.fillStyle = baseColor;
      paintContext.fillRect(0, 0, paintCanvas.width, paintCanvas.height);
      paintContext.fillStyle = "rgba(255,255,255,0.2)";
      paintContext.fillRect(0, 0, paintCanvas.width, 92);

      if (localPaintTexture) {
        localPaintTexture.needsUpdate = true;
      }
    }

    function setLocalPlayerTexture(player) {
      if (!localPlayer) {
        return;
      }

      const previousBaseColor = localState.baseColor;

      if (player.color) {
        localState.baseColor = player.color;
      }

      if (localState.localPaintDirty && player.paintDataUrl !== localState.lastSentPaintDataUrl) {
        return;
      }

      if (player.paintDataUrl && player.paintDataUrl !== localState.paintDataUrl) {
        localState.paintDataUrl = player.paintDataUrl;
        localState.localPaintDirty = false;
        const image = new Image();
        image.onload = () => {
          paintContext.clearRect(0, 0, paintCanvas.width, paintCanvas.height);
          paintContext.drawImage(image, 0, 0, paintCanvas.width, paintCanvas.height);
          localPaintTexture.needsUpdate = true;
        };
        image.src = player.paintDataUrl;
      } else if (!player.paintDataUrl && (localState.paintDataUrl !== null || previousBaseColor !== localState.baseColor)) {
        localState.paintDataUrl = null;
        localState.localPaintDirty = false;
        setupPaintCanvas(localState.baseColor);
      }

      localPlayer.material.color.set(0xffffff);
    }

    function syncPlayers(players) {
      const activeIds = new Set();

      for (const player of players) {
        const playerId = normalizePlayerId(player);

        if (!playerId) {
          continue;
        }

        activeIds.add(playerId);

        if (playerId === localState.playerId) {
          localState.role = player.role || localState.role;
          localState.scale = player.scale || 1;
          localState.isBlind = Boolean(player.isBlind);
          localState.isCaught = Boolean(player.isCaught);

          if (!localState.hasServerSpawn && player.position && localPlayer) {
            localPlayer.position.set(player.position.x || 0, player.position.y || getPlayerGroundY(), player.position.z || 14);
            localState.hasServerSpawn = true;
          }

          setLocalPlayerTexture(player);
          applyLocalScale();
          continue;
        }

        updateRemotePlayer({ ...player, playerId });
      }

      for (const [playerId, mesh] of remotePlayers.entries()) {
        if (!activeIds.has(playerId)) {
          scene.remove(mesh);
          remotePlayers.delete(playerId);
        }
      }

      updateHud();
    }

    function updateRemotePlayer(payload) {
      if (!payload || payload.playerId === localState.playerId || payload.roomCode && payload.roomCode !== localState.roomCode) {
        return;
      }

      let mesh = remotePlayers.get(payload.playerId);

      if (!mesh) {
        mesh = createPlayerMesh(payload.color || "#4f8cff");
        mesh.userData.playerId = payload.playerId;
        remotePlayers.set(payload.playerId, mesh);
        scene.add(mesh);
      }

      if (payload.paintDataUrl && mesh.userData.paintDataUrl !== payload.paintDataUrl) {
        mesh.userData.paintDataUrl = payload.paintDataUrl;
        textureLoader.load(payload.paintDataUrl, (texture) => {
          texture.colorSpace = THREE.SRGBColorSpace;
          mesh.material.map = texture;
          mesh.material.color.set(0xffffff);
          mesh.material.needsUpdate = true;
        });
      } else if (payload.color && !payload.paintDataUrl) {
        mesh.material.color.set(payload.color);
      }

      const scale = payload.scale || 1;
      mesh.scale.setScalar(scale);

      if (payload.position) {
        mesh.position.set(payload.position.x ?? mesh.position.x, payload.position.y ?? 1, payload.position.z ?? mesh.position.z);
      }

      if (payload.rotation) {
        mesh.rotation.set(0, payload.rotation.y ?? mesh.rotation.y, 0);
      }

      mesh.userData.role = payload.role;
      mesh.userData.isCaught = Boolean(payload.isCaught);
      mesh.visible = shouldShowRemotePlayer(payload);
      mesh.material.opacity = payload.isCaught ? 0.35 : 1;
    }

    function shouldShowRemotePlayer(player) {
      if (localState.isBlind && localState.role === "seeker") {
        return false;
      }

      return !player.isCaught || localState.role === "spectator";
    }

    function applyRoomState(room) {
      if (!room) {
        return;
      }

      localState.hostId = room.hostId;
      localState.roomStatus = room.status;
      localState.blindRemainingMs = room.blindRemainingMs || 0;
      localState.revealRemainingMs = room.revealRemainingMs || 0;

      const localPlayerState = room.players?.find((player) => normalizePlayerId(player) === localState.playerId);

      if (localPlayerState) {
        const previousRole = localState.role;
        localState.role = localPlayerState.role || "lobby";
        localState.scale = localPlayerState.scale || 1;
        localState.isBlind = Boolean(localPlayerState.isBlind);
        localState.isCaught = Boolean(localPlayerState.isCaught);

        if (room.status === "revealing" && previousRole !== localState.role) {
          showRoleReveal();
        }
      }

      if (scene) {
        syncPlayers(room.players || []);
      }

      localState.canMove = room.status !== "revealing" && !localState.isCaught;
      updateHud();
    }

    function showRoleReveal() {
      const isSeeker = localState.role === "seeker";
      roleRevealTitle.textContent = isSeeker ? "You are the Seeker" : "You are a Hider";
      roleRevealText.textContent = isSeeker
        ? "You will be blind first. Count it down, then hunt."
        : "You are smaller now. Hide before the hunt begins.";
      roleOverlay.classList.add("is-visible");
    }

    function updateHud() {
      const statusPrefix = localState.roomStatus === "revealing" ? "REVEAL " : "";
      roleLabel.textContent = `${statusPrefix}${localState.isCaught ? "SPECTATOR" : localState.role.toUpperCase()}`;
      startGameButton.classList.toggle("is-hidden", localState.hostId !== localState.playerId || localState.role !== "lobby");
      roleOverlay.classList.toggle("is-visible", localState.roomStatus === "revealing");
      blindOverlay.classList.toggle("is-visible", localState.isBlind && localState.role === "seeker" && localState.roomStatus === "playing");
      blindTimeLabel.textContent = Math.ceil(localState.blindRemainingMs / 1000);
      blindLabel.textContent = localState.isBlind ? `Blind ${Math.ceil(localState.blindRemainingMs / 1000)}s` : "";
    }

    function applyLocalScale() {
      if (!localPlayer) {
        return;
      }

      localPlayer.scale.setScalar(localState.scale);
      localPlayer.position.y = getPlayerGroundY();
    }

    function getPlayerGroundY() {
      return localState.scale;
    }

    function getPlayerRadius() {
      return 0.48 * localState.scale;
    }

    function handlePointerLockChange() {
      localState.pointerLocked = document.pointerLockElement === renderer.domElement;
      crosshair.classList.toggle("is-visible", localState.pointerLocked && !localState.paintMode);
      hint.classList.toggle("is-hidden", localState.pointerLocked || localState.paintMode);
    }

    function handleMouseMove(event) {
      if (localState.paintMode && localState.isCameraOrbitingPaint) {
        localState.yaw -= event.movementX * 0.006;
        localState.pitch = THREE.MathUtils.clamp(localState.pitch + event.movementY * 0.004, 0.08, 0.92);
        return;
      }

      if (!localState.pointerLocked || localState.paintMode) {
        return;
      }

      localState.yaw -= event.movementX * 0.0025;
      localState.pitch = THREE.MathUtils.clamp(localState.pitch + event.movementY * 0.002, 0.08, 0.92);
    }

    function handleCanvasClick(event) {
      if (!localState.paintMode && !localState.isCaught && !localState.pointerLocked) {
        renderer.domElement.requestPointerLock();
        return;
      }

      if (!localState.paintMode) {
        handleWorldClick(event);
      }
    }

    function handleKeyDown(event) {
      if (event.code === "KeyE" && scene) {
        event.preventDefault();
        togglePaintMode();
        return;
      }

      if (event.code === "Space" && localState.grounded && localState.canMove && !localState.paintMode) {
        event.preventDefault();
        localState.velocityY = 6.8;
        localState.grounded = false;
      }

      if (["KeyW", "KeyA", "KeyS", "KeyD", "ShiftLeft", "ShiftRight", "Space"].includes(event.code)) {
        keyboardState.set(event.code, true);
      }
    }

    function handleKeyUp(event) {
      keyboardState.set(event.code, false);
    }

    function updateLocalMovement(deltaSeconds) {
      if (!localState.canMove || localState.paintMode) {
        return;
      }

      const speed = keyboardState.get("ShiftLeft") || keyboardState.get("ShiftRight") ? 7.4 : 4.8;
      const forwardInput = Number(Boolean(keyboardState.get("KeyW"))) - Number(Boolean(keyboardState.get("KeyS")));
      const rightInput = Number(Boolean(keyboardState.get("KeyD"))) - Number(Boolean(keyboardState.get("KeyA")));

      const forward = new THREE.Vector3(Math.sin(localState.yaw), 0, Math.cos(localState.yaw) * -1);
      const right = new THREE.Vector3(Math.cos(localState.yaw), 0, Math.sin(localState.yaw));
      const move = new THREE.Vector3()
        .addScaledVector(forward, forwardInput)
        .addScaledVector(right, rightInput);

      if (move.lengthSq() > 0) {
        move.normalize().multiplyScalar(speed * deltaSeconds);
        moveWithCollisions(move.x, move.z);
        localPlayer.rotation.y = Math.atan2(move.x, move.z);
      }

      updateJump(deltaSeconds);
    }

    function moveWithCollisions(dx, dz) {
      const nextX = localPlayer.position.x + dx;

      if (!wouldCollide(nextX, localPlayer.position.z)) {
        localPlayer.position.x = nextX;
      }

      const nextZ = localPlayer.position.z + dz;

      if (!wouldCollide(localPlayer.position.x, nextZ)) {
        localPlayer.position.z = nextZ;
      }

      localPlayer.position.x = THREE.MathUtils.clamp(localPlayer.position.x, -21.8, 21.8);
      localPlayer.position.z = THREE.MathUtils.clamp(localPlayer.position.z, -16.8, 16.8);
    }

    function wouldCollide(x, z) {
      const radius = getPlayerRadius();

      return colliders.some((box) => (
        x + radius > box.minX
        && x - radius < box.maxX
        && z + radius > box.minZ
        && z - radius < box.maxZ
      ));
    }

    function updateJump(deltaSeconds) {
      localState.velocityY -= 18 * deltaSeconds;
      localPlayer.position.y += localState.velocityY * deltaSeconds;

      const groundY = getPlayerGroundY();

      if (localPlayer.position.y <= groundY) {
        localPlayer.position.y = groundY;
        localState.velocityY = 0;
        localState.grounded = true;
      }
    }

    function updateCamera(smoothing = 0.12) {
      if (!localPlayer || localState.isCaught) {
        return;
      }

      const playerFocus = new THREE.Vector3(localPlayer.position.x, localPlayer.position.y + 0.9 * localState.scale, localPlayer.position.z);
      const distance = localState.paintMode ? 4.4 : 6.5;
      const height = localState.paintMode ? 1.65 : 2.4;
      const horizontal = Math.cos(localState.pitch) * distance;
      const cameraTarget = new THREE.Vector3(
        playerFocus.x - Math.sin(localState.yaw) * horizontal,
        playerFocus.y + Math.sin(localState.pitch) * distance + height,
        playerFocus.z + Math.cos(localState.yaw) * horizontal
      );

      camera.position.lerp(cameraTarget, smoothing);
      camera.lookAt(playerFocus);
    }

    function updateSpectatorCamera() {
      if (!localState.isCaught) {
        return;
      }

      const seeker = Array.from(remotePlayers.values()).find((mesh) => mesh.userData.role === "seeker");

      if (!seeker) {
        return;
      }

      const target = new THREE.Vector3(seeker.position.x, 4.5, seeker.position.z + 6);
      camera.position.lerp(target, 0.08);
      camera.lookAt(seeker.position.x, seeker.position.y + 0.7, seeker.position.z);
    }

    function sendMoveIfNeeded(now) {
      if (!localState.roomCode || !localPlayer || now - localState.lastMoveSentAt < localState.sendIntervalMs) {
        return;
      }

      localState.lastMoveSentAt = now;

      socket.emit("player-move", {
        roomCode: localState.roomCode,
        position: {
          x: localPlayer.position.x,
          y: localPlayer.position.y,
          z: localPlayer.position.z
        },
        rotation: {
          x: 0,
          y: localPlayer.rotation.y,
          z: 0
        }
      });
    }

    function handlePointerDown(event) {
      if (localState.paintMode && event.button === 0) {
        localState.isPainting = true;
        paintOnSelf(event, true);
      } else if (localState.paintMode && event.button === 2) {
        localState.isCameraOrbitingPaint = true;
      }
    }

    function handlePointerMove(event) {
      if (localState.paintMode && localState.isPainting) {
        paintOnSelf(event, false);
      }
    }

    function handlePointerUp() {
      if (localState.isPainting) {
        localState.isPainting = false;
        sendPaintUpdate(true);
      }

      localState.isCameraOrbitingPaint = false;
    }

    function paintOnSelf(event, forceSend) {
      const rect = renderer.domElement.getBoundingClientRect();
      const pointer = new THREE.Vector2(
        ((event.clientX - rect.left) / rect.width) * 2 - 1,
        -(((event.clientY - rect.top) / rect.height) * 2 - 1)
      );

      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObject(localPlayer, false);

      if (hits.length === 0 || !hits[0].uv) {
        return;
      }

      if (hits[0].face && Math.abs(hits[0].face.normal.y) > 0.64) {
        return;
      }

      const uv = hits[0].uv;
      const x = uv.x * paintCanvas.width;
      const y = (1 - uv.y) * paintCanvas.height;
      const radius = 8;
      const gradient = paintContext.createRadialGradient(x, y, 1, x, y, radius);
      gradient.addColorStop(0, paintColorInput.value);
      gradient.addColorStop(1, "rgba(255,255,255,0)");
      paintContext.fillStyle = gradient;
      paintContext.beginPath();
      paintContext.arc(x, y, radius, 0, Math.PI * 2);
      paintContext.fill();
      localPaintTexture.needsUpdate = true;
      localState.paintDataUrl = null;
      localState.localPaintDirty = true;
      sendPaintUpdate(forceSend);
    }

    function sendPaintUpdate(force = false) {
      const now = performance.now();

      if (!force && now - localState.lastPaintSentAt < 260) {
        return;
      }

      localState.lastPaintSentAt = now;
      const paintDataUrl = paintCanvas.toDataURL("image/png");
      localState.paintDataUrl = paintDataUrl;
      localState.lastSentPaintDataUrl = paintDataUrl;
      localState.localPaintDirty = false;
      socket.emit("paint-update", {
        roomCode: localState.roomCode,
        paintDataUrl
      });
    }

    function handleWorldClick(event) {
      if (event.button !== 0 || localState.paintMode || localState.role !== "seeker" || localState.isBlind || localState.isCaught || localState.roomStatus !== "playing") {
        return;
      }

      raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
      const targets = Array.from(remotePlayers.values()).filter((mesh) => mesh.visible && mesh.userData.role === "hider" && !mesh.userData.isCaught);
      const hits = raycaster.intersectObjects(targets, false);

      if (hits.length > 0) {
        socket.emit("tag-player", {
          roomCode: localState.roomCode,
          targetId: hits[0].object.userData.playerId
        });
      }
    }

    function togglePaintMode() {
      localState.paintMode = !localState.paintMode;
      paintTools.classList.toggle("is-visible", localState.paintMode);
      crosshair.classList.toggle("is-visible", !localState.paintMode && localState.pointerLocked);
      hint.textContent = localState.paintMode
        ? "Paint mode: click directly on your avatar. Press E to return to movement."
        : "Click to lock camera. WASD moves, Space jumps, E paints directly on yourself, Seeker clicks Hiders to tag.";
      hint.classList.toggle("is-hidden", !localState.paintMode && localState.pointerLocked);

      if (localState.paintMode && document.pointerLockElement) {
        document.exitPointerLock();
      }
    }

    function clearPaint() {
      setupPaintCanvas(localState.baseColor);
      localState.paintDataUrl = null;
      localState.localPaintDirty = true;
      sendPaintUpdate(true);
    }

    function animate(now) {
      const deltaSeconds = Math.min((now - previousFrameAt) / 1000, 0.05);
      previousFrameAt = now;

      updateLocalMovement(deltaSeconds);
      updateCamera();
      updateSpectatorCamera();
      sendMoveIfNeeded(now);

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    function startAnimationLoop() {
      if (animationStarted) {
        return;
      }

      animationStarted = true;
      previousFrameAt = performance.now();
      requestAnimationFrame(animate);
    }

    function resizeRenderer() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    createRoomButton.addEventListener("click", async () => {
      setBusy(true);
      setStatus("Creating room...");

      try {
        const response = await emitWithAck("create-room");

        if (!response?.ok) {
          throw new Error(response?.message || "Could not create room.");
        }

        startGameClient(response);
      } catch (error) {
        setStatus(error.message, true);
      } finally {
        setBusy(false);
      }
    });

    joinRoomButton.addEventListener("click", async () => {
      const roomCode = roomCodeInput.value.trim();

      if (!/^\d{4}$/.test(roomCode)) {
        setStatus("Enter a 4 digit room code.", true);
        return;
      }

      setBusy(true);
      setStatus("Joining room...");

      try {
        const response = await emitWithAck("join-room", { roomCode });

        if (!response?.ok) {
          throw new Error(response?.message || "Could not join room.");
        }

        startGameClient(response);
      } catch (error) {
        setStatus(error.message, true);
      } finally {
        setBusy(false);
      }
    });

    startGameButton.addEventListener("click", async () => {
      startGameButton.disabled = true;

      try {
        const response = await emitWithAck("start-game", { roomCode: localState.roomCode });

        if (!response?.ok) {
          throw new Error(response?.message || "Could not start game.");
        }

        applyRoomState(response.room);
      } catch (error) {
        console.warn(error.message);
      } finally {
        startGameButton.disabled = false;
      }
    });

    clearPaintButton.addEventListener("click", clearPaint);

    roomCodeInput.addEventListener("input", () => {
      roomCodeInput.value = roomCodeInput.value.replace(/\D/g, "").slice(0, 4);
    });

    roomCodeInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        joinRoomButton.click();
      }
    });

    renderer?.domElement?.addEventListener?.("click", handleWorldClick);

    socket.on("connect", () => {
      connectionDot.classList.add("is-online");
      setStatus("Connected.");
    });

    socket.on("disconnect", () => {
      connectionDot.classList.remove("is-online");
      setStatus("Disconnected from server.", true);
    });

    socket.on("connect_error", () => {
      connectionDot.classList.remove("is-online");
      setStatus("Cannot reach server.", true);
    });

    socket.on("game-state", (payload) => applyRoomState(payload?.room));
    socket.on("game-started", (payload) => applyRoomState(payload?.room));
    socket.on("player-update", updateRemotePlayer);
    socket.on("player-joined", (payload) => applyRoomState(payload?.room));
    socket.on("player-left", (payload) => {
      if (payload?.playerId && remotePlayers.has(payload.playerId)) {
        const mesh = remotePlayers.get(payload.playerId);
        scene.remove(mesh);
        remotePlayers.delete(payload.playerId);
      }

      applyRoomState(payload?.room);
    });
    socket.on("player-tagged", (payload) => applyRoomState(payload?.room));
  </script>
</body>
</html>
