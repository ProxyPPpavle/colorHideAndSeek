<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Color Hide And Seek</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101419;
      --panel: rgba(18, 24, 31, 0.88);
      --panel-border: rgba(255, 255, 255, 0.14);
      --text: #f3f7fb;
      --muted: #9aa9b7;
      --accent: #35c48f;
      --accent-strong: #24a875;
      --danger: #ff6b6b;
      --field: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    button,
    input {
      font: inherit;
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 0 18px;
      background: var(--accent);
      color: #06130f;
      font-weight: 800;
      cursor: pointer;
      transition: transform 140ms ease, background 140ms ease, opacity 140ms ease;
    }

    button:hover {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 0 14px;
      background: var(--field);
      color: var(--text);
      outline: none;
      text-transform: uppercase;
    }

    input:focus {
      border-color: rgba(53, 196, 143, 0.9);
      box-shadow: 0 0 0 3px rgba(53, 196, 143, 0.16);
    }

    .lobby {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(135deg, rgba(16, 20, 25, 0.92), rgba(16, 20, 25, 0.66)),
        radial-gradient(circle at center, rgba(53, 196, 143, 0.18), transparent 42%);
    }

    .lobby.is-hidden {
      display: none;
    }

    .lobby-panel {
      width: min(440px, 100%);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 24px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(16px);
    }

    .title {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.5;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .join-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    .status {
      min-height: 22px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .status.is-error {
      color: var(--danger);
    }

    .hud {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 5;
      display: none;
      gap: 8px;
      align-items: center;
      max-width: calc(100% - 32px);
      padding: 10px 12px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: rgba(18, 24, 31, 0.72);
      color: var(--text);
      backdrop-filter: blur(12px);
      font-size: 14px;
    }

    .hud.is-visible {
      display: flex;
    }

    .dot {
      width: 10px;
      height: 10px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--danger);
    }

    .dot.is-online {
      background: var(--accent);
    }

    .room-code {
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    @media (max-width: 520px) {
      .lobby-panel {
        padding: 18px;
      }

      .join-row {
        grid-template-columns: 1fr;
      }

      .title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div id="lobby" class="lobby">
    <section class="lobby-panel" aria-label="Lobby">
      <h1 class="title">Color Hide And Seek</h1>
      <p class="subtitle">Multiplayer test lobby</p>

      <div class="stack">
        <button id="createRoomButton" type="button">Create Room</button>

        <div class="join-row">
          <input id="roomCodeInput" type="text" inputmode="numeric" maxlength="4" placeholder="Room code" aria-label="Room code">
          <button id="joinRoomButton" type="button">Join Room</button>
        </div>
      </div>

      <div id="statusText" class="status">Connecting...</div>
    </section>
  </div>

  <div id="hud" class="hud">
    <span id="connectionDot" class="dot" aria-hidden="true"></span>
    <span id="hudText">Room <span id="roomCodeLabel" class="room-code">----</span></span>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    const socket = io("https://colorhideandseek.onrender.com");

    const lobby = document.getElementById("lobby");
    const hud = document.getElementById("hud");
    const statusText = document.getElementById("statusText");
    const connectionDot = document.getElementById("connectionDot");
    const roomCodeLabel = document.getElementById("roomCodeLabel");
    const createRoomButton = document.getElementById("createRoomButton");
    const joinRoomButton = document.getElementById("joinRoomButton");
    const roomCodeInput = document.getElementById("roomCodeInput");

    const keys = new Set();
    const remotePlayers = new Map();
    const localState = {
      roomCode: null,
      playerId: null,
      lastMoveSentAt: 0,
      sendIntervalMs: 75
    };

    let scene;
    let camera;
    let renderer;
    let localPlayer;
    let animationStarted = false;
    let previousFrameAt = performance.now();

    function setStatus(message, isError = false) {
      statusText.textContent = message;
      statusText.classList.toggle("is-error", isError);
    }

    function setBusy(isBusy) {
      createRoomButton.disabled = isBusy;
      joinRoomButton.disabled = isBusy;
      roomCodeInput.disabled = isBusy;
    }

    function emitWithAck(eventName, payload = {}) {
      return new Promise((resolve, reject) => {
        socket.timeout(6000).emit(eventName, payload, (error, response) => {
          if (error) {
            reject(new Error("Server response timed out."));
            return;
          }

          resolve(response);
        });
      });
    }

    function startGame(response) {
      localState.roomCode = response.roomCode;
      localState.playerId = response.playerId || socket.id;

      lobby.classList.add("is-hidden");
      hud.classList.add("is-visible");
      roomCodeLabel.textContent = localState.roomCode;

      initScene();
      addKnownPlayers(response.room?.players || []);
      startAnimationLoop();
    }

    function initScene() {
      if (scene) {
        return;
      }

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x101419);

      camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 7, 10);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      const ambientLight = new THREE.HemisphereLight(0xffffff, 0x53606c, 1.8);
      scene.add(ambientLight);

      const sunLight = new THREE.DirectionalLight(0xffffff, 2.2);
      sunLight.position.set(6, 10, 4);
      sunLight.castShadow = true;
      scene.add(sunLight);

      const floorGeometry = new THREE.PlaneGeometry(48, 48, 24, 24);
      const floorMaterial = new THREE.MeshStandardMaterial({
        color: 0x31424b,
        roughness: 0.82,
        metalness: 0.04
      });
      const floor = new THREE.Mesh(floorGeometry, floorMaterial);
      floor.rotation.x = -Math.PI / 2;
      floor.receiveShadow = true;
      scene.add(floor);

      const grid = new THREE.GridHelper(48, 24, 0x6d7d88, 0x46545d);
      grid.position.y = 0.01;
      scene.add(grid);

      localPlayer = createPlayerMesh(0x35c48f);
      localPlayer.position.set(0, 1, 0);
      scene.add(localPlayer);

      window.addEventListener("resize", resizeRenderer);
      window.addEventListener("keydown", handleKeyDown);
      window.addEventListener("keyup", handleKeyUp);
    }

    function createPlayerMesh(color) {
      const geometry = new THREE.CapsuleGeometry(0.45, 1.1, 8, 18);
      const material = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.56,
        metalness: 0.02
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.castShadow = true;
      return mesh;
    }

    function getPlayerColor(playerId) {
      let hash = 0;

      for (let index = 0; index < playerId.length; index += 1) {
        hash = (hash * 31 + playerId.charCodeAt(index)) >>> 0;
      }

      const hue = hash % 360;
      return new THREE.Color(`hsl(${hue}, 72%, 58%)`);
    }

    function addKnownPlayers(playerIds) {
      playerIds
        .filter((playerId) => playerId && playerId !== localState.playerId)
        .forEach((playerId) => {
          if (!remotePlayers.has(playerId)) {
            const mesh = createPlayerMesh(getPlayerColor(playerId));
            mesh.position.set(0, 1, 0);
            remotePlayers.set(playerId, mesh);
            scene.add(mesh);
          }
        });
    }

    function handleKeyDown(event) {
      const key = event.key.toLowerCase();

      if (["w", "a", "s", "d"].includes(key)) {
        keys.add(key);
      }
    }

    function handleKeyUp(event) {
      keys.delete(event.key.toLowerCase());
    }

    function updateLocalMovement(deltaSeconds) {
      const moveDirection = new THREE.Vector3(
        Number(keys.has("d")) - Number(keys.has("a")),
        0,
        Number(keys.has("s")) - Number(keys.has("w"))
      );

      if (moveDirection.lengthSq() === 0) {
        return;
      }

      moveDirection.normalize();
      localPlayer.position.addScaledVector(moveDirection, 5.2 * deltaSeconds);
      localPlayer.position.x = THREE.MathUtils.clamp(localPlayer.position.x, -23, 23);
      localPlayer.position.z = THREE.MathUtils.clamp(localPlayer.position.z, -23, 23);
      localPlayer.rotation.y = Math.atan2(moveDirection.x, moveDirection.z);
    }

    function updateCamera() {
      const targetPosition = new THREE.Vector3(
        localPlayer.position.x,
        localPlayer.position.y + 6,
        localPlayer.position.z + 9
      );

      camera.position.lerp(targetPosition, 0.1);
      camera.lookAt(localPlayer.position.x, localPlayer.position.y + 0.6, localPlayer.position.z);
    }

    function sendMoveIfNeeded(now) {
      if (!localState.roomCode || now - localState.lastMoveSentAt < localState.sendIntervalMs) {
        return;
      }

      localState.lastMoveSentAt = now;

      socket.emit("player-move", {
        roomCode: localState.roomCode,
        position: {
          x: localPlayer.position.x,
          y: localPlayer.position.y,
          z: localPlayer.position.z
        },
        rotation: {
          x: localPlayer.rotation.x,
          y: localPlayer.rotation.y,
          z: localPlayer.rotation.z
        }
      });
    }

    function updateRemotePlayer(payload) {
      if (!payload || payload.playerId === localState.playerId || payload.roomCode !== localState.roomCode) {
        return;
      }

      let mesh = remotePlayers.get(payload.playerId);

      if (!mesh) {
        mesh = createPlayerMesh(getPlayerColor(payload.playerId));
        remotePlayers.set(payload.playerId, mesh);
        scene.add(mesh);
      }

      if (payload.position) {
        mesh.position.set(
          payload.position.x ?? mesh.position.x,
          payload.position.y ?? mesh.position.y,
          payload.position.z ?? mesh.position.z
        );
      }

      if (payload.rotation) {
        mesh.rotation.set(
          payload.rotation.x ?? mesh.rotation.x,
          payload.rotation.y ?? mesh.rotation.y,
          payload.rotation.z ?? mesh.rotation.z
        );
      }
    }

    function removeRemotePlayer(payload) {
      const playerId = payload?.playerId;

      if (!playerId || !remotePlayers.has(playerId)) {
        return;
      }

      const mesh = remotePlayers.get(playerId);
      remotePlayers.delete(playerId);
      scene.remove(mesh);
      mesh.geometry.dispose();
      mesh.material.dispose();
    }

    function animate(now) {
      const deltaSeconds = Math.min((now - previousFrameAt) / 1000, 0.05);
      previousFrameAt = now;

      updateLocalMovement(deltaSeconds);
      updateCamera();
      sendMoveIfNeeded(now);

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    function startAnimationLoop() {
      if (animationStarted) {
        return;
      }

      animationStarted = true;
      previousFrameAt = performance.now();
      requestAnimationFrame(animate);
    }

    function resizeRenderer() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    createRoomButton.addEventListener("click", async () => {
      setBusy(true);
      setStatus("Creating room...");

      try {
        const response = await emitWithAck("create-room");

        if (!response?.ok) {
          throw new Error(response?.message || "Could not create room.");
        }

        startGame(response);
      } catch (error) {
        setStatus(error.message, true);
      } finally {
        setBusy(false);
      }
    });

    joinRoomButton.addEventListener("click", async () => {
      const roomCode = roomCodeInput.value.trim();

      if (!/^\d{4}$/.test(roomCode)) {
        setStatus("Enter a 4 digit room code.", true);
        return;
      }

      setBusy(true);
      setStatus("Joining room...");

      try {
        const response = await emitWithAck("join-room", { roomCode });

        if (!response?.ok) {
          throw new Error(response?.message || "Could not join room.");
        }

        startGame(response);
      } catch (error) {
        setStatus(error.message, true);
      } finally {
        setBusy(false);
      }
    });

    roomCodeInput.addEventListener("input", () => {
      roomCodeInput.value = roomCodeInput.value.replace(/\D/g, "").slice(0, 4);
    });

    roomCodeInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        joinRoomButton.click();
      }
    });

    socket.on("connect", () => {
      connectionDot.classList.add("is-online");
      setStatus("Connected.");
    });

    socket.on("disconnect", () => {
      connectionDot.classList.remove("is-online");
      setStatus("Disconnected from server.", true);
    });

    socket.on("connect_error", () => {
      connectionDot.classList.remove("is-online");
      setStatus("Cannot reach server.", true);
    });

    socket.on("player-update", updateRemotePlayer);
    socket.on("player-move", updateRemotePlayer);
    socket.on("player-joined", (payload) => addKnownPlayers(payload?.players || [payload?.playerId]));
    socket.on("player-left", removeRemotePlayer);
  </script>
</body>
</html>
